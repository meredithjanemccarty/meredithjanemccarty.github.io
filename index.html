<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meredith J McCarty</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #111111;
      --mid: #555555;
      --light: #aaaaaa;
      --accent: #c8a96e;
      --bg: #ffffff;
      --border: #e8e8e8;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--black);
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 3rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      z-index: 100;
    }

    .nav-name {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--black);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    nav a {
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--mid);
      text-decoration: none;
      transition: color 0.2s;
    }

    nav a:hover { color: var(--black); }
    nav a.active { color: var(--accent); border-bottom: 1px solid var(--accent); padding-bottom: 2px; }

    /* ── ABOUT SECTION ── */
    section {
      max-width: 820px;
      margin: 0 auto;
      padding: 3.5rem 2rem;
    }

    section h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.7rem;
      font-weight: 600;
      margin-bottom: 1.2rem;
      color: var(--black);
    }

    section p {
      font-size: 1rem;
      line-height: 1.8;
      color: #333;
      margin-bottom: 1rem;
      font-weight: 300;
    }

    section p.indented {
      padding-left: 2rem;
    }

    section p a {
      color: var(--black);
      font-weight: 500;
      border-bottom: 1px solid var(--accent);
      text-decoration: none;
      transition: color 0.2s;
    }

    section p a:hover { color: var(--accent); }

    /* ── CENTERED IMAGE ── */
    .feature-image-wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 2rem 2rem 3.5rem;
      display: flex;
      justify-content: center;
    }

    .feature-image-wrap img {
      width: 100%;
      max-width: 600px;
      height: auto;
      display: block;
      object-fit: cover;
    }

    /* ── DIVIDER ── */
    .divider {
      max-width: 820px;
      margin: 0 auto;
      padding: 0 2rem;
      border-top: 1px solid var(--border);
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 2rem;
      font-size: 0.8rem;
      color: var(--light);
      letter-spacing: 0.04em;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 580px) {
      nav { padding: 1.2rem 1.5rem; }
      section { padding: 2.5rem 1.5rem; }
      .feature-image-wrap { padding: 1.5rem 1.5rem 2.5rem; }
    }
  </style>
</head>
<body>

  <!-- ── NAVIGATION ── -->
  <nav>
    <a href="index.html" class="nav-name">Meredith J McCarty</a>
    <div class="nav-links">
      <a href="research.html">Research</a>
      <a href="visualarts.html">Visual Arts</a>
      <a href="internet.html">Internet</a>
    </div>
  </nav>

  <!-- ── CENTERED IMAGE ── -->
  <div class="feature-image-wrap">
    <img src="1.png" alt="Featured image" />
  </div>

  <div class="divider"></div>
<footer>&copy; 2026 McCarty</footer>
  <!-- ── FOOTER ── */
  <footer>
    2026 Meredith J McCarty &mdash; All rights reserved
  </footer>
  

</body>
</html>
